# Place this file in your SOURCE repo at:
# .github/workflows/docs-updated.yml
#
# Replace USERNAME/REPO with the actual source repo path.
# The WEB_REPO_PAT must be a classic PAT with `repo` scope,
# stored as a secret in the source repo's Settings → Secrets → Actions.

on:
  push:
    branches: [main]
    paths:
      - 'docs/content/**'
      - 'mkdocs.yml'  # optional — trigger on config changes too

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WEB_REPO_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'droidspaces',
              repo: 'droidspaces.github.io',
              event_type: 'docs-updated',
              client_payload: {
                ref: context.ref,
                sha: context.sha
              }
            });
